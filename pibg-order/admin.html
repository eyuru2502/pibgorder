<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Baju PIBG</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a5c2e;
    --green-mid: #2d8a4e;
    --green-bright: #3cb96b;
    --green-light: #a8e6bf;
    --green-pale: #e8f7ee;
    --gold: #f5c842;
    --white: #ffffff;
    --gray-soft: #f4f9f6;
    --text-dark: #0d2b18;
    --text-mid: #2d5a3d;
    --text-light: #6aaa84;
    --danger: #e05a5a;
    --shadow: 0 4px 24px rgba(26,92,46,0.12);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: var(--gray-soft); min-height: 100vh; color: var(--text-dark); }

  /* ===== LOGIN PAGE ===== */
  #login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    padding: 24px;
  }
  .login-card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    text-align: center;
    animation: slideUp 0.5s cubic-bezier(.4,2,.6,1) both;
  }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .login-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 16px;
  }
  .login-card h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 22px; font-weight: 800;
    color: var(--green-dark);
    margin-bottom: 4px;
  }
  .login-card p { font-size: 13px; color: var(--text-light); margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input {
    width: 100%; padding: 12px 14px;
    border: 2px solid #e0edea;
    border-radius: 10px;
    font-family: 'Poppins'; font-size: 14px; color: var(--text-dark);
    background: var(--gray-soft); outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--green-bright); background: white; }
  .login-btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    color: white; border: none; border-radius: 10px;
    font-family: 'Poppins'; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(45,138,78,0.3); }
  .login-err { color: var(--danger); font-size: 12px; margin-top: 10px; display: none; }
  .back-link { display: block; margin-top: 16px; font-size: 12px; color: var(--text-light); text-decoration: none; }
  .back-link:hover { color: var(--green-mid); }

  /* ===== DASHBOARD ===== */
  #dashboard-page { display: none; }
  .dash-header {
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dash-header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 20px; font-weight: 800; color: white;
  }
  .dash-header p { font-size: 12px; color: rgba(255,255,255,0.7); }
  .logout-btn {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
    color: white; padding: 8px 16px; border-radius: 999px;
    font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Poppins';
    transition: background 0.2s;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.25); }

  .dash-body { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (min-width: 600px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card {
    background: white; border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); text-align: center;
  }
  .stat-card .stat-val {
    font-family: 'Baloo 2', cursive; font-size: 28px; font-weight: 800;
    color: var(--green-dark); line-height: 1;
  }
  .stat-card .stat-label { font-size: 11px; color: var(--text-light); margin-top: 4px; font-weight: 500; }
  .stat-card .stat-sub { font-size: 13px; font-weight: 600; color: var(--green-mid); margin-top: 2px; }

  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 16px; border-radius: 999px; border: 2px solid #e0edea;
    background: white; font-family: 'Poppins'; font-size: 12px; font-weight: 600;
    color: var(--text-mid); cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--green-bright); border-color: var(--green-bright); color: white;
  }
  .search-input {
    flex: 1; min-width: 160px; padding: 8px 14px;
    border: 2px solid #e0edea; border-radius: 999px;
    font-family: 'Poppins'; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--green-bright); }

  .orders-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .orders-card-header {
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--green-pale);
  }
  .orders-card-header h3 { font-size: 15px; font-weight: 700; color: var(--green-dark); }
  .export-btn {
    padding: 7px 14px; background: var(--green-pale); border: none;
    border-radius: 8px; font-family: 'Poppins'; font-size: 12px; font-weight: 600;
    color: var(--green-dark); cursor: pointer; transition: background 0.2s;
  }
  .export-btn:hover { background: var(--green-light); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    padding: 10px 14px; text-align: left;
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-light);
    background: var(--gray-soft); border-bottom: 1px solid #e0edea;
  }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: var(--green-pale); }
  tbody td { padding: 12px 14px; border-bottom: 1px solid #f0f8f4; color: var(--text-dark); vertical-align: middle; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  }
  .badge-css { background: #dff0ff; color: #1a6faa; }
  .badge-rnls { background: #fff0d9; color: #a06010; }
  .badge-rnss { background: #f0e8ff; color: #5a2da0; }
  .badge-mus { background: #ffe8ee; color: #a02050; }

  .empty-state { padding: 48px; text-align: center; color: var(--text-light); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .loading { padding: 48px; text-align: center; color: var(--text-light); }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--green-pale);
    border-top-color: var(--green-bright); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h2>Admin PIBG</h2>
    <p>Log masuk untuk lihat dashboard pesanan</p>
    <div class="form-group">
      <label class="form-label">Nama Pengguna</label>
      <input class="form-input" id="username" type="text" placeholder="admin" onkeypress="if(event.key==='Enter')doLogin()">
    </div>
    <div class="form-group">
      <label class="form-label">Kata Laluan</label>
      <input class="form-input" id="password" type="password" placeholder="••••••••" onkeypress="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Log Masuk</button>
    <p class="login-err" id="login-err">Nama pengguna atau kata laluan salah.</p>
    <a class="back-link" href="index.html">← Kembali ke borang pesanan</a>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-page">
  <div class="dash-header">
    <div>
      <h1>📊 Dashboard Pesanan</h1>
      <p>Baju PIBG 2026 — Hijau</p>
    </div>
    <button class="logout-btn" onclick="doLogout()">Log Keluar</button>
  </div>

  <div class="dash-body">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">—</div>
        <div class="stat-label">Jumlah Pesanan</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-qty">—</div>
        <div class="stat-label">Jumlah Baju</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-rev">—</div>
        <div class="stat-label">Jumlah Kutipan (RM)</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-pending">—</div>
        <div class="stat-label">Hari Berbaki</div>
        <div class="stat-sub">Tutup 8 Mei 2026</div>
      </div>
    </div>

    <!-- Filter + Search -->
    <div class="filter-bar">
      <input class="search-input" id="search-box" type="text" placeholder="🔍 Cari nama atau telefon..." oninput="renderTable()">
      <button class="filter-btn active" onclick="setFilter('all',this)">Semua</button>
      <button class="filter-btn" onclick="setFilter('CSS',this)">CSS</button>
      <button class="filter-btn" onclick="setFilter('RNLS',this)">RNLS</button>
      <button class="filter-btn" onclick="setFilter('RNSS',this)">RNSS</button>
      <button class="filter-btn" onclick="setFilter('Muslimah',this)">Muslimah</button>
    </div>

    <!-- Table -->
    <div class="orders-card">
      <div class="orders-card-header">
        <h3>📋 Senarai Pesanan</h3>
        <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
      <div id="table-container">
        <div class="loading"><div class="spinner"></div>Memuatkan data...</div>
      </div>
    </div>
  </div>
</div>

<script>
  // === AUTH ===
  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'pibg2026';

  function doLogin() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if (u === ADMIN_USER && p === ADMIN_PASS) {
      sessionStorage.setItem('pibg_admin', '1');
      showDashboard();
    } else {
      document.getElementById('login-err').style.display = 'block';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('pibg_admin');
    document.getElementById('dashboard-page').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
  }

  function showDashboard() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('dashboard-page').style.display = 'block';
    loadOrders();
  }

  if (sessionStorage.getItem('pibg_admin')) showDashboard();

  // === DATA ===
  let allOrders = [];
  let currentFilter = 'all';

  async function loadOrders() {
    try {
      const res = await fetch('/.netlify/functions/orders');
      const data = await res.json();
      allOrders = data.orders || [];
      updateStats();
      renderTable();
    } catch (e) {
      document.getElementById('table-container').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Gagal memuatkan data. Cuba refresh halaman.</p></div>';
    }
  }

  function updateStats() {
    const total = allOrders.length;
    const qty = allOrders.reduce((a, o) => a + (o.kuantiti || 0), 0);
    const rev = allOrders.reduce((a, o) => a + (o.jumlah || 0), 0);
    const deadline = new Date('2026-05-08');
    const today = new Date();
    const days = Math.max(0, Math.ceil((deadline - today) / 86400000));
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-qty').textContent = qty;
    document.getElementById('stat-rev').textContent = rev;
    document.getElementById('stat-pending').textContent = days;
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search-box').value.toLowerCase();
    let filtered = allOrders.filter(o => {
      const matchFilter = currentFilter === 'all' || o.jenis === currentFilter;
      const matchSearch = !q || o.nama?.toLowerCase().includes(q) || o.telefon?.includes(q);
      return matchFilter && matchSearch;
    });

    if (filtered.length === 0) {
      document.getElementById('table-container').innerHTML =
        '<div class="empty-state"><div class="icon">📭</div><p>Tiada pesanan ditemui.</p></div>';
      return;
    }

    const badgeClass = j => ({ CSS:'badge-css', RNLS:'badge-rnls', RNSS:'badge-rnss', Muslimah:'badge-mus' }[j] || '');
    const rows = filtered.map((o, i) => `
      <tr>
        <td style="font-weight:600;color:var(--text-light)">${i+1}</td>
        <td><strong>${o.nama || '—'}</strong></td>
        <td>${o.telefon || '—'}</td>
        <td>${o.kelas || '—'}</td>
        <td><span class="badge ${badgeClass(o.jenis)}">${o.jenis || '—'}</span></td>
        <td><strong>${o.saiz || '—'}</strong></td>
        <td style="text-align:center">${o.kuantiti || 1}</td>
        <td style="font-weight:700;color:var(--green-dark)">RM ${o.jumlah || 0}</td>
        <td style="font-size:11px;color:var(--text-light)">${o.tarikh || '—'}</td>
      </tr>
    `).join('');

    document.getElementById('table-container').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Nama</th><th>Telefon</th><th>Kelas</th>
              <th>Jenis</th><th>Saiz</th><th>Qty</th><th>Jumlah</th><th>Tarikh</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function exportCSV() {
    const headers = ['Bil','Nama','Telefon','Kelas','Jenis','Saiz','Kuantiti','Jumlah (RM)','Tarikh'];
    const rows = allOrders.map((o, i) =>
      [i+1, o.nama, o.telefon, o.kelas, o.jenis, o.saiz, o.kuantiti, o.jumlah, o.tarikh].join(',')
    );
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pesanan_baju_pibg_2026.csv';
    a.click();
  }
</script>
</body>
</html>
